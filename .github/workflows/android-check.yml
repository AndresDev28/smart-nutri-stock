name: Android CI (Quality, Testing & Build)

on:
  pull_request:
    branches: [ main ] # Se activa cuando alguien quiere subir algo a main
  push:
    branches: [ main ] # Se activa cuando se mergea a main (crea APK)

jobs:
  # Job 1: Quality checks (Corre en PRs y push a main)
  test_and_lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Lint (Format Check)
        run: ./gradlew lintDebug

      - name: Run Unit Tests (TDD Enforcement)
        # Esto ejecutará tus 60 escenarios de prueba de la lógica de negocio
        run: ./gradlew testDebugUnitTest

  # Job 2: Build APK (Solo corre en push a main, después de que pasen los tests)
  build_apk:
    runs-on: ubuntu-latest
    needs: test_and_lint
    if: github.event_name == 'push'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: smart-nutri-stock-snapshot-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30 # Mantener el APK disponible por 30 días
