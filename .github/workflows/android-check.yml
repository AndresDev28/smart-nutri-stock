name: Android CI (Quality & Testing)

on:
  pull_request:
    branches: [ main ] # Se activa cuando alguien quiere subir algo a main

jobs:
  test_and_lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Lint (Format Check)
        run: ./gradlew lintDebug

      - name: Run Unit Tests (TDD Enforcement)
        # Esto ejecutará tus 60 escenarios de prueba de la lógica de negocio
        run: ./gradlew testDebugUnitTest