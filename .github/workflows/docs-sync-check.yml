name: Docs Sync Check

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  docs-sync-check:
    name: Validate Documentation Version Synchronization
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Documentation Version Sync Check
        run: .github/pre-commit-docs.sh

      - name: Check Documentation Links
        run: |
          echo "Checking for broken documentation links..."
          # Check if BACKLOG.md has been archived (should not exist at root)
          if [ -f "BACKLOG.md" ]; then
            echo "WARNING: BACKLOG.md exists at root. Should be archived to docs/archived/"
            # Check if it's just a stub/redirect
            if ! grep -q "MOVED" BACKLOG.md && ! grep -q "FUTURE_ROADMAP.md" BACKLOG.md; then
              echo "ERROR: BACKLOG.md should be archived or converted to a redirect stub"
              exit 1
            fi
          fi
          echo "Documentation links validated successfully"
